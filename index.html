<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0f17">
<title>PredictX — UP or DOWN?</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#0b0f17;overscroll-behavior:none;overflow:hidden}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#root{width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#0b0f17;color:#e2e8f0;font-family:'DM Mono',monospace;position:relative;overflow:hidden}
.syne{font-family:'Syne',sans-serif}

/* TOP NAV */
#topNav{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:44px;background:#111827;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.navLogo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.02em;color:#00e676}
.navPill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s}
.navPill.active{background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.35);color:#00e676}
.navPill:not(.active){color:rgba(226,232,240,.4)}

/* DESKTOP LAYOUT: chat | chart | leaderboard */
#main{flex:1;display:flex;overflow:hidden;min-height:0}
#chatSidebar{width:185px;border-right:1px solid rgba(255,255,255,.07);background:#0c1018;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#chartArea{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#sidebar{width:170px;border-left:1px solid rgba(255,255,255,.07);background:#0e1420;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}

/* CHAT sidebar */
.chatHead{font-size:9px;letter-spacing:.1em;color:rgba(226,232,240,.35);padding:7px 10px 5px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:6px;flex-shrink:0}
.chatFeed{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:3px 0;scroll-behavior:smooth}
.chatFeed::-webkit-scrollbar{width:2px}
.chatFeed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.chatMsg{padding:4px 9px;font-size:10px;line-height:1.4;border-bottom:1px solid rgba(255,255,255,.03);animation:slideUp .18s ease}
.chatUser{font-weight:600;margin-right:3px}
.chatText{color:rgba(226,232,240,.55)}
.chatInput{padding:5px 7px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.chatInputBox{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#e2e8f0;font-family:'DM Mono',monospace;font-size:10px;padding:5px 8px;outline:none;transition:border-color .15s}
.chatInputBox:focus{border-color:rgba(0,230,118,.35)}
.chatInputBox::placeholder{color:rgba(226,232,240,.2)}

/* CHART TOP BAR */
#chartTopBar{padding:5px 10px;background:#0e1420;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:6px;min-height:30px}
.histPillGC{display:inline-flex;align-items:center;justify-content:center;height:18px;padding:0 5px;border-radius:4px;font-size:9px;font-weight:700;flex-shrink:0;white-space:nowrap;cursor:default;font-family:'DM Mono',monospace}
.topBarStat{font-size:9px;color:rgba(226,232,240,.3);white-space:nowrap;flex-shrink:0}
.topBarStat span{color:#e2e8f0}

/* MULTIPLIER HERO - responsive */
#multWrap{position:relative;display:flex;align-items:center;justify-content:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;background:#0a0d14}
#multDisplay{font-family:'Syne',sans-serif;font-weight:800;font-size:36px;letter-spacing:-.02em;transition:color .2s;line-height:1}
#multSub{font-size:9px;letter-spacing:.1em;color:rgba(226,232,240,.28);margin-top:1px;text-align:center}

/* CANVAS AREA */
#cvWrap{flex:1;position:relative;background:#090c12;overflow:hidden;min-height:0}
#cv{display:block;width:100%;height:100%}
#phaseChip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Syne',sans-serif;font-size:16px;font-weight:800;padding:7px 20px;border-radius:8px;white-space:nowrap;z-index:4;display:none;pointer-events:none}

/* BET PANEL */
#betPanel{background:#111827;border-top:1px solid rgba(255,255,255,.08);padding:8px 11px;flex-shrink:0}

/* MOBILE CHAT STRIP - shown only on mobile, scrolling horizontal */
#mobileChatStrip{background:#0c1018;border-top:1px solid rgba(255,255,255,.07);padding:5px 10px;display:none;gap:0;flex-direction:column;flex-shrink:0;max-height:60px;overflow:hidden}
#mobileChatMessages{display:flex;flex-direction:column;gap:0;overflow:hidden;flex:1}
.mobileChatMsg{font-size:10px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;animation:slideUp .15s ease}

/* MOBILE LEADERS STRIP */
#mobileSidebar{background:#111827;border-top:1px solid rgba(255,255,255,.07);padding:6px 10px;display:none;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}

/* RESPONSIVE */
@media(max-width:640px){
  #chatSidebar{display:none !important}
  #sidebar{display:none !important}
  #mobileChatStrip{display:flex}
  #mobileSidebar{display:flex}
  #multDisplay{font-size:28px}
  #multSub{display:none}
  #multWrap{padding:3px 0}
  #chartTopBar{padding:4px 8px;min-height:26px}
  .histPillGC{font-size:8px;height:16px;padding:0 4px}
  #betPanel{padding:7px 10px}
}
@media(min-width:641px){
  #chatSidebar{display:flex !important}
  #sidebar{display:flex !important}
  #mobileChatStrip{display:none !important}
  #mobileSidebar{display:none !important}
}

/* BUTTONS */
.btn-up{background:linear-gradient(135deg,#00e676,#00c853);color:#012208;border:none;cursor:pointer;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;height:50px;flex:1;transition:opacity .1s,transform .08s;letter-spacing:.01em}
.btn-up:active:not(:disabled){opacity:.8;transform:scale(.96)}
.btn-up:disabled{opacity:.2;cursor:not-allowed}
.btn-dn{background:linear-gradient(135deg,#f44336,#c62828);color:#1a0000;border:none;cursor:pointer;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;height:50px;flex:1;transition:opacity .1s,transform .08s;letter-spacing:.01em}
.btn-dn:active:not(:disabled){opacity:.8;transform:scale(.96)}
.btn-dn:disabled{opacity:.2;cursor:not-allowed}
.qbtn{height:30px;padding:0 9px;font-size:11px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(226,232,240,.5);cursor:pointer;font-family:'DM Mono',monospace;transition:all .1s;white-space:nowrap}
.qbtn.active,.qbtn:hover{background:rgba(0,230,118,.15);border-color:rgba(0,230,118,.4);color:#00e676}
.qbtn:disabled{opacity:.22;pointer-events:none}
.sl{-webkit-appearance:none;appearance:none;width:100%;height:28px;background:transparent;outline:none;cursor:pointer;padding:0;border:none}
.sl::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:rgba(255,255,255,.15)}
.sl::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:#00e676;margin-top:-11px;box-shadow:0 0 12px rgba(0,230,118,.6)}
.sl::-moz-range-track{height:4px;border-radius:2px;background:rgba(255,255,255,.15);border:none}
.sl::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#00e676;border:none}

/* SIDEBAR */
.sbHead{font-size:8px;letter-spacing:.12em;color:rgba(226,232,240,.28);padding:7px 10px 5px;border-bottom:1px solid rgba(255,255,255,.06)}
.lbRow{display:flex;align-items:center;gap:5px;padding:5px 9px;border-bottom:1px solid rgba(255,255,255,.04);font-size:10px}

/* NOTIF + FX */
.notif{position:fixed;top:52px;left:50%;transform:translateX(-50%);background:rgba(8,12,20,.97);border:1px solid rgba(0,230,118,.5);border-radius:8px;padding:8px 18px;font-size:12px;font-weight:500;z-index:999;white-space:nowrap;pointer-events:none;opacity:0;max-width:90vw;text-align:center}
.cf{position:fixed;pointer-events:none;z-index:998;animation:cffall linear forwards}
.floatPRD{position:fixed;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;pointer-events:none;z-index:997;left:50%;animation:floatUp 1s ease forwards}
.playerLabel{position:absolute;background:rgba(0,0,0,.85);border-radius:5px;padding:2px 7px;font-size:10px;pointer-events:none;white-space:nowrap;z-index:3;font-family:'DM Mono',monospace;animation:slideUp .2s ease}

@keyframes cffall{to{transform:translateY(900px) rotate(960deg);opacity:0}}
@keyframes floatUp{0%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(-60px);opacity:0}}
@keyframes popIn{0%{transform:translateX(-50%) scale(.6);opacity:0}65%{transform:translateX(-50%) scale(1.06)}100%{transform:translateX(-50%) scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(5px);opacity:0}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-5px)}35%{transform:translateX(5px)}55%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes winFlash{0%{background:#0b0f17}30%{background:rgba(0,230,118,.1)}100%{background:#0b0f17}}
@keyframes loseFlash{0%{background:#0b0f17}30%{background:rgba(244,67,54,.1)}100%{background:#0b0f17}}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ldot{width:5px;height:5px;border-radius:50%;background:#00e676;display:inline-block;margin-right:4px;vertical-align:middle;animation:blink 1.1s infinite}
</style>
</head>
<body>
<div id="root">
<div class="notif" id="notif"></div>

<!-- TOP NAV -->
<div id="topNav">
  <div class="navLogo">PREDICT<span style="color:#fff">X</span></div>
  <div style="display:flex;gap:5px">
    <div class="navPill active"><span style="font-size:12px">▲▼</span> Trade</div>
    <div class="navPill" onclick="openLeaders()">🏆 Board</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="text-align:right">
      <div style="font-size:8px;color:rgba(226,232,240,.3);letter-spacing:.1em">BALANCE</div>
      <div class="syne" style="font-size:15px;font-weight:700;color:#00e676" id="balDisp">1,000 PRD</div>
    </div>
    <div style="font-size:9px;color:#00e676;border:1px solid rgba(0,230,118,.3);border-radius:4px;padding:2px 7px;display:flex;align-items:center"><span class="ldot"></span>LIVE</div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LIVE CHAT SIDEBAR (desktop only) -->
  <div id="chatSidebar">
    <div class="chatHead">
      <span class="ldot" style="margin:0"></span>
      Chat (<span id="chatCount">33</span>)
    </div>
    <div class="chatFeed" id="chatFeed"></div>
    <div class="chatInput">
      <input class="chatInputBox" type="text" placeholder="Say something..." id="chatBox" onkeydown="sendChat(event)">
    </div>
  </div>

  <!-- CHART AREA -->
  <div id="chartArea">

    <!-- TOP BAR: history pills -->
    <div id="chartTopBar">
      <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0;overflow:hidden">
        <span class="topBarStat">Last <span id="histCount">0</span></span>
        <div style="display:flex;gap:2px;overflow:hidden;flex:1" id="histPills"></div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <span class="topBarStat">RND <span id="rndDisp">#1</span></span>
        <span class="topBarStat" id="playersDisp">— players</span>
      </div>
    </div>

    <!-- MULTIPLIER HERO -->
    <div id="multWrap">
      <div style="text-align:center">
        <div id="multDisplay" style="color:#00e676">1.00×</div>
        <div id="multSub">CURRENT MULTIPLIER</div>
      </div>
      <div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);text-align:right">
        <div style="font-size:9px;color:rgba(226,232,240,.3)">UP: <span style="color:#00e676" id="upMultDisp">1.90×</span></div>
        <div style="font-size:9px;color:rgba(226,232,240,.3)">DN: <span style="color:#f44336" id="dnMultDisp">1.90×</span></div>
      </div>
      <div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);text-align:center">
        <div class="syne" id="timerDisp" style="font-size:22px;font-weight:800;line-height:1;transition:color .3s">—</div>
        <div style="font-size:7px;color:rgba(226,232,240,.28);letter-spacing:.1em">SEC</div>
        <div style="width:44px;height:2px;border-radius:1px;background:rgba(255,255,255,.1);margin-top:2px;overflow:hidden">
          <div id="tBar" style="height:100%;width:100%;background:#00e676;border-radius:1px;transition:width .38s linear,background .3s"></div>
        </div>
      </div>
    </div>

    <!-- CANVAS -->
    <div id="cvWrap">
      <canvas id="cv"></canvas>
      <div id="phaseChip"></div>
    </div>

    <!-- BET PANEL -->
    <div id="betPanel">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:10px;color:rgba(226,232,240,.35);white-space:nowrap">STAKE</span>
        <input class="sl" type="range" id="betSl" min="10" max="500" step="10" value="50" oninput="setBet(+this.value)" style="flex:1">
        <span class="syne" style="font-size:17px;font-weight:700;color:#00e676;min-width:68px;text-align:right"><span id="betAmt">50</span> <span style="font-size:10px;opacity:.5">PRD</span></span>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:6px" id="qBtns"></div>
      <div style="display:flex;gap:5px;margin-bottom:6px">
        <div style="flex:1;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:7px;padding:5px 9px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:9px;color:rgba(0,230,118,.6)">▲ LONG wins</span>
          <span class="syne" style="font-size:14px;font-weight:700;color:#00e676">+<span id="potUp">95</span></span>
        </div>
        <div style="flex:1;background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.2);border-radius:7px;padding:5px 9px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:9px;color:rgba(244,67,54,.6)">▼ SHORT wins</span>
          <span class="syne" style="font-size:14px;font-weight:700;color:#f44336">+<span id="potDn">95</span></span>
        </div>
      </div>
      <div id="betBtns" style="display:flex;gap:8px">
        <button class="btn-up" id="bUp" onclick="doBet('UP')">▲ LONG</button>
        <button class="btn-dn" id="bDn" onclick="doBet('DOWN')">▼ SHORT</button>
      </div>
      <div id="activeBet" style="display:none;border-radius:8px;padding:9px;text-align:center"></div>
      <div id="nextRndBar" style="display:none;border-radius:8px;padding:7px;text-align:center;background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.2);margin-top:5px">
        <span style="font-size:10px;color:rgba(226,232,240,.4)">Next round in </span>
        <span class="syne" style="font-size:17px;font-weight:800;color:#00e676" id="nextCnt">2</span>
        <span style="font-size:10px;color:rgba(226,232,240,.4)">s</span>
      </div>
    </div>

  </div><!-- /chartArea -->

  <!-- RIGHT SIDEBAR (desktop) -->
  <div id="sidebar">
    <div class="sbHead">LIVE PLAYERS</div>
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch" id="liveBoard"></div>
    <div class="sbHead" style="margin-top:auto">RECENT WINNERS</div>
    <div id="recentWinners" style="overflow:hidden;max-height:150px"></div>
  </div>

</div><!-- /main -->

<!-- MOBILE CHAT STRIP (2 lines max, scrolling feed) -->
<div id="mobileChatStrip">
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-shrink:0">
    <span class="ldot" style="margin:0;flex-shrink:0"></span>
    <span style="font-size:8px;color:rgba(226,232,240,.3);letter-spacing:.08em">CHAT (<span id="mobileChatCount">33</span>)</span>
    <input style="flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:#e2e8f0;font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;outline:none;min-width:0" type="text" placeholder="Say something..." id="mobileChatBox" onkeydown="sendMobileChat(event)">
  </div>
  <div id="mobileChatMessages"></div>
</div>

<!-- MOBILE LEADERS STRIP -->
<div id="mobileSidebar" style="background:#111827;border-top:1px solid rgba(255,255,255,.07);padding:5px 10px;display:none;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0">
  <div style="font-size:9px;color:rgba(226,232,240,.35);white-space:nowrap;align-self:center">TOP:</div>
  <div id="mobileLbStrip" style="display:flex;gap:5px"></div>
</div>

</div><!-- /root -->

<!-- LEADERS MODAL -->
<div id="leadersModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;overflow-y:auto;padding:16px">
  <div style="background:#111827;border-radius:14px;max-width:400px;margin:0 auto;overflow:hidden">
    <div style="padding:13px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08)">
      <div class="syne" style="font-size:15px;font-weight:700">Leaderboard</div>
      <button onclick="closeLeaders()" style="background:rgba(255,255,255,.08);border:none;color:#e2e8f0;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px">Close</button>
    </div>
    <div style="padding:12px" id="modalLbContent"></div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const C={
  FEE:.02, BASE_MULT:1.9,
  TICK_MS:350, TPC:3, MAX_C:14,
  NOISE:.0035, TREND:.001,
  SPIKE_P:.06, SPIKE_M:.01,
  EVENT_P:.15, EVENT_M:.025,
  NM_SECS:4, NM_PULL:.25,
  PRICE_MIN:880, PRICE_MAX:1120,
};

// ── STATE ───────────────────────────────────────────────────────────────────
const S={
  bal:1000, bet:50, myBet:null,
  phase:'waiting', rndNum:0, timeLeft:0, dur:30,
  price:1000, priceHist:[],
  candles:[], curC:null, tIC:0,
  tUp:0, tDn:0, upMult:1.9, dnMult:1.9,
  currentMult:1.0,
  streak:0, wins:0, losses:0,
  history:[], winners:[],
  round:null, tDir:0, tLeft2:0,
  tickIv:null, nextIv:null, elapsed:0, players:128,
  playerLabels:[],
  lb:[
    {n:'0xNexus',b:18820,w:187,s:9,pct:'+167%'},
    {n:'voidTrader',b:13340,w:112,s:5,pct:'+184%'},
    {n:'moonSniper',b:10870,w:94,s:3,pct:'+156%'},
    {n:'rugSurvivor',b:8210,w:78,s:0,pct:'+72%'},
    {n:'blockHunter',b:6440,w:61,s:2,pct:'+137%'},
    {n:'alpha_wolf',b:5120,w:54,s:1,pct:'+119%'},
    {n:'nexus_x',b:4220,w:47,s:0,pct:'+92%'},
  ],
};

// ── MATH ─────────────────────────────────────────────────────────────────
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function mr(p){const mid=(C.PRICE_MIN+C.PRICE_MAX)/2,r=(C.PRICE_MAX-C.PRICE_MIN)/2;return-((p-mid)/r)*.003;}
function nT(){if(S.tLeft2<=0){const r=Math.random();S.tDir=r<.33?-1:r<.66?0:1;S.tLeft2=2+Math.floor(Math.random()*5);}S.tLeft2--;return S.tDir;}

function genPath(start,settle,ticks,trend){
  const path=[],ev=Math.floor(Math.random()*ticks*.5);
  const hasEv=Math.random()<C.EVENT_P,shock=hasEv?C.EVENT_M*(Math.random()>.5?1:-1):0;
  let p=start;
  const nmS=ticks-Math.floor(C.NM_SECS*1000/C.TICK_MS);
  for(let t=0;t<ticks;t++){
    const prog=t/ticks,tf=trend*C.TREND*p,ns=gauss()*C.NOISE*p;
    const sp=Math.random()<C.SPIKE_P?(Math.random()>.5?1:-1)*C.SPIKE_M*p:0;
    const sh=t===ev?shock*p:0,rv=mr(p)*p;
    const pull=(settle-p)*Math.pow(prog,2.2)*.14;
    const nm=t>=nmS&&t<ticks-2?(start-p)*C.NM_PULL:0;
    p=Math.max(C.PRICE_MIN,Math.min(C.PRICE_MAX,p+tf+ns+sp+sh+rv+pull+nm));
    path.push(+p.toFixed(3));
  }
  path[path.length-1]=settle; return path;
}

function pushTick(price){
  if(!S.curC){S.curC={o:price,h:price,l:price,c:price};S.tIC=1;}
  else{
    S.curC.h=Math.max(S.curC.h,price);S.curC.l=Math.min(S.curC.l,price);S.curC.c=price;S.tIC++;
    if(S.tIC>=C.TPC){S.candles.push({...S.curC});if(S.candles.length>80)S.candles.shift();S.curC={o:price,h:price,l:price,c:price};S.tIC=0;}
  }
}

function calcPayouts(){
  const pool=S.tUp+S.tDn;
  if(pool===0){S.upMult=C.BASE_MULT;S.dnMult=C.BASE_MULT;return;}
  const rp=pool*(1-C.FEE);
  S.upMult=S.tUp>0?Math.min(5,Math.max(1.05,rp/S.tUp)):C.BASE_MULT;
  S.dnMult=S.tDn>0?Math.min(5,Math.max(1.05,rp/S.tDn)):C.BASE_MULT;
}

function calcCurrentMult(prog){
  return Math.max(1.0,+(1+prog*1.2+gauss()*0.03).toFixed(4));
}

// ── CHART ─────────────────────────────────────────────────────────────────
function drawChart(){
  const cv=document.getElementById('cv');
  const wrap=document.getElementById('cvWrap');
  const dpr=Math.min(window.devicePixelRatio||1,3);
  const W=Math.round(wrap.clientWidth*dpr);
  const H=Math.round(wrap.clientHeight*dpr);
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;cv.style.width=wrap.clientWidth+'px';cv.style.height=wrap.clientHeight+'px';}
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(W===0||H===0)return;

  const all=[...S.candles];if(S.curC)all.push({...S.curC});if(all.length<2)return;

  const isMobile=window.innerWidth<=640;
  // Smaller volume area on mobile to give candles more height
  const PL=6, PR=52, PT=12, PB=isMobile?32:44;
  const cw=W-PL-PR, ch=H-PT-PB;
  const vis=all.slice(-C.MAX_C);

  const pMax=Math.max(...vis.map(c=>c.h));
  const pMin=Math.min(...vis.map(c=>c.l));
  const rng=pMax-pMin;
  // KEY FIX: generous padding (22%) so candles don't fill entire height
  // This makes the chart look natural, not zoomed in
  const pad=Math.max(rng*.22, 2);
  const lo=pMin-pad, hi=pMax+pad;
  const py=p=>PT+ch*(1-(p-lo)/(hi-lo));

  // Background
  ctx.fillStyle='#090c12';ctx.fillRect(0,0,W,H);

  // Grid
  for(let i=0;i<=5;i++){
    const y=PT+(ch/5)*i;
    ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=dpr;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
  }

  // Y-axis labels
  for(let i=0;i<=4;i++){
    const y=PT+(ch/4)*i;
    ctx.fillStyle='rgba(226,232,240,.18)';ctx.font=`${9*dpr}px DM Mono`;
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText((hi-(hi-lo)*(i/4)).toFixed(1),W-2,y);
  }

  // Entry price line
  if(S.round){
    const ey=py(S.round.entryPrice);
    ctx.strokeStyle='rgba(245,197,24,.5)';ctx.lineWidth=1.5*dpr;ctx.setLineDash([6*dpr,4*dpr]);
    ctx.beginPath();ctx.moveTo(PL,ey);ctx.lineTo(W-PR,ey);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(245,197,24,.6)';ctx.font=`bold ${8.5*dpr}px DM Mono`;
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText('START '+S.round.entryPrice.toFixed(1),W-PR-5,ey-9*dpr);
  }

  // Round-start vertical line
  ctx.strokeStyle='rgba(0,230,118,.45)';ctx.lineWidth=2*dpr;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(PL+cw*.08,PT);ctx.lineTo(PL+cw*.08,PT+ch);ctx.stroke();

  // ── CANDLES ──────────────────────────────────────────────────────────────
  const cStep=cw/C.MAX_C;
  // Width: 72% of step — wide but not absurd
  const bw=Math.max(8*dpr, cStep*.72);
  const volMax=Math.max(...vis.map(c=>Math.abs(c.h-c.l)))||1;
  const volAreaH=(PB-6)*0.8;

  vis.forEach((c,i)=>{
    const isUp=c.c>=c.o;
    const isLast=i===vis.length-1;
    const x=PL+cStep*(i+.5);

    const bodyTop=py(Math.max(c.o,c.c));
    const bodyBot=py(Math.min(c.o,c.c));
    // Min body height: 3px (not too small, not too big)
    const bodyH=Math.max(3*dpr, bodyBot-bodyTop);
    const wickTop=py(c.h);
    const wickBot=py(c.l);

    // Glow on latest candle only
    if(isLast){
      const gc=isUp?'rgba(0,230,118,.25)':'rgba(239,83,80,.25)';
      const g=ctx.createRadialGradient(x,bodyTop+bodyH/2,0,x,bodyTop+bodyH/2,bw*1.2);
      g.addColorStop(0,gc);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(x-bw*1.2,bodyTop-12*dpr,bw*2.4,bodyH+24*dpr);
    }

    // Wicks
    const wickW=Math.max(1.5*dpr,bw*.065);
    ctx.strokeStyle=isUp?'rgba(0,255,130,.7)':'rgba(255,100,90,.65)';
    ctx.lineWidth=wickW;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(x,wickTop);ctx.lineTo(x,bodyTop);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,bodyTop+bodyH);ctx.lineTo(x,wickBot);ctx.stroke();

    // Body gradient
    const grad=ctx.createLinearGradient(0,bodyTop,0,bodyTop+bodyH);
    if(isUp){grad.addColorStop(0,'rgba(0,230,118,.97)');grad.addColorStop(1,'rgba(0,200,83,.82)');}
    else{grad.addColorStop(0,'rgba(239,83,80,.97)');grad.addColorStop(1,'rgba(198,40,40,.82)');}
    ctx.fillStyle=grad;

    // Rounded corners
    const r=Math.min(3.5*dpr,bw/5,bodyH/3);
    ctx.beginPath();
    ctx.moveTo(x-bw/2+r,bodyTop);
    ctx.lineTo(x+bw/2-r,bodyTop);
    ctx.arcTo(x+bw/2,bodyTop,x+bw/2,bodyTop+r,r);
    ctx.lineTo(x+bw/2,bodyTop+bodyH-r);
    ctx.arcTo(x+bw/2,bodyTop+bodyH,x+bw/2-r,bodyTop+bodyH,r);
    ctx.lineTo(x-bw/2+r,bodyTop+bodyH);
    ctx.arcTo(x-bw/2,bodyTop+bodyH,x-bw/2,bodyTop+bodyH-r,r);
    ctx.lineTo(x-bw/2,bodyTop+r);
    ctx.arcTo(x-bw/2,bodyTop,x-bw/2+r,bodyTop,r);
    ctx.closePath();
    ctx.fill();

    // Edge highlight
    ctx.strokeStyle=isUp?'rgba(120,255,180,.4)':'rgba(255,120,110,.4)';
    ctx.lineWidth=dpr*.65;ctx.stroke();

    // Volume bars (bottom area)
    const vFrac=Math.abs(c.h-c.l)/volMax;
    const vH=Math.max(1.5*dpr, volAreaH*vFrac*dpr*.5);
    const vbw=Math.max(5*dpr,bw*.68);
    ctx.fillStyle=isUp?'rgba(0,230,118,.22)':'rgba(239,83,80,.22)';
    ctx.fillRect(x-vbw/2,H-vH-3,vbw,vH);
  });

  // Live price dashed line
  const curY=py(S.price);
  const upN=S.candles.length>0&&S.price>=(S.candles[S.candles.length-1]?.c||S.price);
  ctx.strokeStyle=upN?'rgba(0,230,118,.65)':'rgba(239,83,80,.65)';
  ctx.lineWidth=1.5*dpr;ctx.setLineDash([5*dpr,4*dpr]);
  ctx.beginPath();ctx.moveTo(PL,curY);ctx.lineTo(W-PR,curY);ctx.stroke();ctx.setLineDash([]);

  // Price tag
  const tagW=PR-4,tagH=17*dpr,tagX=W-PR+2,tagY=curY-tagH/2;
  const pCol=upN?'#00e676':'#ef5350';
  ctx.fillStyle=upN?'rgba(0,230,118,.18)':'rgba(239,83,80,.18)';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(tagX,tagY,tagW,tagH,3*dpr);ctx.fill();}
  else ctx.fillRect(tagX,tagY,tagW,tagH);
  ctx.strokeStyle=pCol;ctx.lineWidth=.7*dpr;ctx.setLineDash([]);
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(tagX,tagY,tagW,tagH,3*dpr);ctx.stroke();}
  ctx.fillStyle=pCol;ctx.font=`bold ${9*dpr}px DM Mono`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(S.price.toFixed(1),tagX+tagW/2,curY);

  // Delta %
  if(S.round){
    const d=S.price-S.round.entryPrice;
    const dp=(d/S.round.entryPrice*100).toFixed(3);
    ctx.fillStyle=d>=0?'rgba(0,230,118,.88)':'rgba(239,83,80,.88)';
    ctx.font=`bold ${10*dpr}px DM Mono`;ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText((d>=0?'+':'')+dp+'%',PL+cw/2,H-1);
  }
}

// ── ROUND ENGINE ──────────────────────────────────────────────────────────
function startRound(){
  clearInterval(S.nextIv);
  document.getElementById('nextRndBar').style.display='none';
  S.rndNum++;S.myBet=null;S.tUp=0;S.tDn=0;S.phase='open';S.elapsed=0;S.currentMult=1.0;
  S.upMult=C.BASE_MULT;S.dnMult=C.BASE_MULT;
  S.players=90+Math.floor(Math.random()*80);
  clearPlayerLabels();

  const dur=22+Math.floor(Math.random()*18);S.dur=dur;
  const totalTicks=Math.round(dur*1000/C.TICK_MS);
  const lockTick=Math.floor(totalTicks*.48);
  const dir=crypto.getRandomValues(new Uint8Array(1))[0]<128?'UP':'DOWN';
  const movePct=.002+Math.random()*.013;
  const settle=Math.max(C.PRICE_MIN,Math.min(C.PRICE_MAX,S.price*(1+(dir==='UP'?1:-1)*movePct)));
  const path=genPath(S.price,settle,totalTicks,nT());
  S.round={num:S.rndNum,direction:dir,settlementPrice:settle,entryPrice:S.price,path,totalTicks,lockTick,dur};

  const bias=.6+Math.random()*.8;
  S.tUp=Math.floor((150+Math.random()*500)*bias);
  S.tDn=Math.floor((150+Math.random()*500)*(1.5-bias));
  calcPayouts();
  setTimeout(spawnPlayerLabels,1200);

  clearInterval(S.tickIv);
  S.tickIv=setInterval(()=>{
    S.elapsed++;
    S.timeLeft=Math.max(0,Math.round((S.round.totalTicks-S.elapsed)*C.TICK_MS/1000));
    S.price=S.round.path[Math.min(S.elapsed,S.round.path.length-1)];
    S.priceHist=[...S.priceHist.slice(-199),S.price];
    pushTick(S.price);
    S.currentMult=calcCurrentMult(S.elapsed/S.round.totalTicks);
    if(S.elapsed>=lockTick&&S.phase==='open')S.phase='locked';
    renderAll();
    if(S.elapsed>=S.round.totalTicks){clearInterval(S.tickIv);settleRound();}
  },C.TICK_MS);
  renderAll();
}

function settleRound(){
  S.phase='settled';
  const r=S.round;S.price=r.settlementPrice;pushTick(S.price);
  calcPayouts();

  const roundMult=+(1.2+Math.random()*.8+Math.random()*.5).toFixed(2);
  S.history.unshift({rnd:r.num,result:r.direction,myBet:null,won:false,payout:0,diff:'0',mult:roundMult});

  const mult=r.direction==='UP'?S.upMult:S.dnMult;
  if(S.myBet){
    const won=S.myBet.direction===r.direction;
    let payout=0;if(won)payout=+(S.myBet.amount*mult).toFixed(2);
    S.bal=Math.max(0,+(S.bal+(won?payout:0)).toFixed(2));
    const diff=((r.settlementPrice-r.entryPrice)/r.entryPrice*100).toFixed(3);
    S.history[0]={...S.history[0],myBet:S.myBet,won,payout,diff};
    if(won){
      S.streak++;S.wins++;doConfetti();flashRoot('win');
      spawnFloat('+'+payout.toFixed(0)+' PRD','#00e676');
      notify('+ '+payout.toFixed(0)+' PRD'+(S.streak>=3?' · '+S.streak+' STREAK!':''));
      addWinner('YOU',payout,true);
      addChatMsg('System','🎉 YOU won +'+payout.toFixed(0)+' PRD!',true);
    } else{
      S.streak=0;S.losses++;flashRoot('lose');
      if(Math.abs(parseFloat(diff))<.07)shakeEl('root');
      notify(Math.abs(parseFloat(diff))<.07?'Near miss · Lost by '+diff+'%':'Lost · '+S.myBet.amount+' PRD');
    }
  }
  if(S.history.length>20)S.history.pop();

  const fnames=['alpha_wolf','voidTrader','moon_x','rekt_lord','nexus_x'];
  for(let i=0;i<2+Math.floor(Math.random()*4);i++){
    const fn=fnames[Math.floor(Math.random()*fnames.length)];
    addWinner(fn,+(50+Math.random()*280).toFixed(0),false);
    setTimeout(()=>addChatMsg(fn,MSG_UP[Math.floor(Math.random()*MSG_UP.length)]),i*400+200);
  }

  renderAll();
  let cnt=2;
  document.getElementById('nextRndBar').style.display='block';
  document.getElementById('nextCnt').textContent=cnt;
  S.nextIv=setInterval(()=>{cnt--;document.getElementById('nextCnt').textContent=cnt;if(cnt<=0){clearInterval(S.nextIv);startRound();}},1000);
}

function addWinner(name,amt,isYou){S.winners.unshift({name,amt,isYou});if(S.winners.length>10)S.winners.pop();}

function doBet(dir){
  if(S.phase!=='open'||S.myBet||S.bet>S.bal)return;
  S.myBet={direction:dir,amount:S.bet};S.bal=+(S.bal-S.bet).toFixed(2);
  if(dir==='UP')S.tUp+=S.bet;else S.tDn+=S.bet;
  calcPayouts();
  addChatMsg('YOU',dir==='UP'?MSG_UP[Math.floor(Math.random()*MSG_UP.length)]:MSG_DN[Math.floor(Math.random()*MSG_DN.length)],true);
  renderAll();
}

  S.bet=parseInt(v);
  document.getElementById('betAmt').textContent=v;
  calcPayouts();
  document.getElementById('potUp').textContent=(S.bet*S.upMult).toFixed(0);
  document.getElementById('potDn').textContent=(S.bet*S.dnMult).toFixed(0);

    const col=last.won?'#00e676':'#f44336';
    ab.style.cssText=`display:block;border-radius:8px;padding:9px;text-align:center;background:${last.won?'rgba(0,230,118,.07)':'rgba(244,67,54,.07)'};border:1px solid ${last.won?'rgba(0,230,118,.2)':'rgba(244,67,54,.2)'}`;
    ab.innerHTML=`<div class="syne" style="font-size:20px;font-weight:800;color:${col}">${last.won?'+ '+last.payout.toFixed(0)+' PRD':'REKT'}</div><div style="font-size:11px;color:rgba(226,232,240,.35);margin-top:2px">${last.won?'Correct!':'Lost by '+Math.abs(parseFloat(last.diff))+'%'} · <span style="color:${S.round.direction==='UP'?'#00e676':'#f44336'}">${S.round.direction} ${S.round.direction==='UP'?'▲':'▼'}</span></div>`;
  }

  const sl=document.getElementById('betSl');sl.max=Math.min(500,S.bal);
  if(S.bet>S.bal){S.bet=Math.max(10,Math.floor(S.bal/10)*10);sl.value=S.bet;document.getElementById('betAmt').textContent=S.bet;}

  renderHistPills();renderSidebar();
}

function renderHistPills(){
  const hp=document.getElementById('histPills');
  const last=S.history.slice(0,20);
  document.getElementById('histCount').textContent=last.length;
  if(!last.length){hp.innerHTML='<span style="font-size:9px;color:rgba(226,232,240,.22)">Play to see history</span>';return;}
  hp.innerHTML=[...last].reverse().map(h=>{
    const isUp=h.result==='UP';
    const label=h.mult?(h.mult.toFixed(2)+'×'):(isUp?'▲':'▼');
    const dot=h.myBet?`<span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:${h.won?'#00e676':'#ef5350'};margin-left:2px;vertical-align:middle"></span>`:'';
    return`<div class="histPillGC" style="background:${isUp?'rgba(0,230,118,.12)':'rgba(239,83,80,.12)'};color:${isUp?'#00e676':'#ef5350'};border:1px solid ${isUp?'rgba(0,230,118,.3)':'rgba(239,83,80,.3)'}">${label}${dot}</div>`;
  }).join('');
}

function renderSidebar(){
  const lb=[...S.lb,{n:'YOU',b:Math.round(S.bal),s:S.streak,w:S.wins,pct:'+'+((S.wins/(S.wins+S.losses||1))*100).toFixed(0)+'%',me:true}];
  lb.sort((a,b)=>b.b-a.b);
  document.getElementById('liveBoard').innerHTML=lb.map((p,i)=>`
    <div class="lbRow" style="${p.me?'background:rgba(0,230,118,.06)':''}">
      <div style="width:13px;font-size:9px;color:rgba(226,232,240,.25)">${i+1}</div>
      <div style="flex:1;min-width:0;overflow:hidden;font-size:10px;color:${p.me?'#00e676':'#e2e8f0'};text-overflow:ellipsis;white-space:nowrap">${p.n}</div>
      <div style="color:#00e676;font-size:9px;text-align:right">${p.b.toLocaleString()}</div>
      <div style="color:#00e676;font-size:9px;min-width:36px;text-align:right">${p.pct||'—'}</div>
    </div>`).join('');

  document.getElementById('recentWinners').innerHTML=S.winners.slice(0,5).map(w=>`
    <div class="lbRow">
      <div style="width:17px;height:17px;border-radius:50%;background:${w.isYou?'rgba(0,230,118,.2)':'rgba(255,255,255,.07)'};display:flex;align-items:center;justify-content:center;font-size:8px;color:${w.isYou?'#00e676':'rgba(226,232,240,.5)'};flex-shrink:0">${w.isYou?'★':w.name.slice(0,2).toUpperCase()}</div>
      <div style="flex:1;min-width:0;font-size:10px;color:${w.isYou?'#00e676':'#e2e8f0'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${w.name}</div>
      <div style="font-size:10px;font-weight:500;color:#00e676">+${w.amt}</div>
    </div>`).join('');

  document.getElementById('mobileLbStrip').innerHTML=lb.slice(0,5).map(p=>`
    <div style="display:flex;align-items:center;gap:4px;white-space:nowrap;padding:3px 8px;border-radius:6px;background:${p.me?'rgba(0,230,118,.1)':'rgba(255,255,255,.05)'};border:1px solid ${p.me?'rgba(0,230,118,.25)':'rgba(255,255,255,.07)'}">
      <span style="font-size:9px;color:${p.me?'#00e676':'#e2e8f0'}">${p.n}</span>
      <span style="font-size:9px;color:#00e676">${p.b.toLocaleString()}</span>
    </div>`).join('');
}

function renderQBtns(){
  const canBet=S.phase==='open'&&!S.myBet;
  document.getElementById('qBtns').innerHTML=[25,50,100,250,'MAX'].map(a=>{
    const val=a==='MAX'?Math.min(500,S.bal):a,isA=S.bet===val&&a!=='MAX';
    return`<button class="qbtn${isA?' active':''}"${(val>S.bal||!canBet)?' disabled':''} onclick="setBet(${val});document.getElementById('betSl').value=${val}">${a}</button>`;
  }).join('');
}

function openLeaders(){
  const lb=[...S.lb,{n:'YOU',b:Math.round(S.bal),s:S.streak,w:S.wins,pct:'+'+((S.wins/(S.wins+S.losses||1))*100).toFixed(0)+'%',me:true}];
  lb.sort((a,b)=>b.b-a.b);const medals=['🥇','🥈','🥉'];
  document.getElementById('modalLbContent').innerHTML=lb.map((p,i)=>`
    <div style="display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);${p.me?'background:rgba(0,230,118,.04);border-radius:8px;padding:9px;':''}">
      <div style="font-size:15px;width:22px">${i<3?medals[i]:i+1}</div>
      <div style="flex:1"><div style="font-size:13px;color:${p.me?'#00e676':'#e2e8f0'}">${p.n}</div><div style="font-size:10px;color:rgba(226,232,240,.3)">${p.w||0}W${p.s>0?' · STK '+p.s:''}</div></div>
      <div style="text-align:right"><div class="syne" style="font-size:14px;font-weight:700;color:#00e676">${p.b.toLocaleString()}</div><div style="font-size:9px;color:rgba(226,232,240,.28)">${p.pct||'—'}</div></div>
    </div>`).join('');
  document.getElementById('leadersModal').style.display='block';
}
function closeLeaders(){document.getElementById('leadersModal').style.display='none';}

function notify(msg){const el=document.getElementById('notif');el.textContent=msg;el.style.opacity='1';el.style.animation='none';void el.offsetWidth;el.style.animation='popIn .25s ease forwards';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',3800);}
function flashRoot(type){const r=document.getElementById('root');r.style.animation='none';void r.offsetWidth;r.style.animation=(type==='win'?'winFlash':'loseFlash')+' .65s ease forwards';}
function shakeEl(id){const el=document.getElementById(id);el.style.animation='none';void el.offsetWidth;el.style.animation='shake .4s ease';setTimeout(()=>el.style.animation='',420);}
function spawnFloat(txt,col){const el=document.createElement('div');el.className='floatPRD';el.style.cssText='color:'+col+';top:35%';el.textContent=txt;document.getElementById('root').appendChild(el);setTimeout(()=>el.remove(),1050);}
function doConfetti(){const cols=['#00e676','#f5c518','#ef5350','#00e5ff','#ff9800'];for(let i=0;i<36;i++){const d=document.createElement('div');d.className='cf';d.style.cssText=`left:${Math.random()*100}%;top:10%;width:${5+Math.random()*5}px;height:${5+Math.random()*5}px;background:${cols[i%5]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.1+Math.random()*1.4}s;animation-delay:${Math.random()*.35}s`;document.body.appendChild(d);setTimeout(()=>d.remove(),(3+Math.random())*1000);}}

// Crowd sim
setInterval(()=>{
  if(S.phase==='open'){
    const add=Math.floor(Math.random()*25);
    if(Math.random()>.5)S.tUp+=add;else S.tDn+=add;calcPayouts();
    const names=['Marix9','cayde','Zephyr2','voidT','alpha'];
    const wrap=document.getElementById('cvWrap');
    const el=document.createElement('div');el.className='playerLabel';
    const isUp=Math.random()>.5;
    el.style.cssText=`border:1px solid ${isUp?'rgba(0,230,118,.45)':'rgba(239,83,80,.45)'};left:${10+Math.random()*50}%;top:${10+Math.random()*55}%`;
    const n=names[Math.floor(Math.random()*names.length)];
    const a=(1+Math.random()*14).toFixed(1);
    el.innerHTML=`<span style="color:rgba(226,232,240,.7)">${n}</span> <span style="color:${isUp?'#00e676':'#ef5350'};font-weight:600">${isUp?'▲':'▼'} +${a} PRD</span>`;
    wrap.appendChild(el);S.playerLabels.push(el);
    setTimeout(()=>el.remove(),4500+Math.random()*2500);
  }
},2400);

// Seed price history
for(let i=0;i<60;i++){
  S.price=Math.max(C.PRICE_MIN,Math.min(C.PRICE_MAX,S.price+gauss()*C.NOISE*S.price));
  S.priceHist.push(S.price);pushTick(S.price);
}
['voidTrader','moonSniper','alpha_wolf','0xNexus'].forEach(n=>addWinner(n,+(50+Math.random()*280).toFixed(0),false));
renderQBtns();startChatSim();startRound();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}</script>
</body>
